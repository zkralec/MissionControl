services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    environment:
      TASK_RUN_HISTORY_DB_PATH: /data/task_run_history.sqlite3
      AI_USAGE_DB_PATH: /data/task_run_history.sqlite3
      EVENT_LOG_DB_PATH: /data/task_run_history.sqlite3
      SYSTEM_METRICS_DB_PATH: /data/task_run_history.sqlite3
      AGENT_HEARTBEAT_DB_PATH: /data/task_run_history.sqlite3
      CANDIDATE_PROFILE_DB_PATH: /data/task_run_history.sqlite3
      DAILY_OPS_REPORT_DB_PATH: /data/task_run_history.sqlite3
      DEAL_ALERT_STATE_DB_PATH: /data/task_run_history.sqlite3
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  worker:
    build: 
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      WORKER_NAME: worker
      TASK_RUN_HISTORY_DB_PATH: /data/task_run_history.sqlite3
      AI_USAGE_DB_PATH: /data/task_run_history.sqlite3
      EVENT_LOG_DB_PATH: /data/task_run_history.sqlite3
      SYSTEM_METRICS_DB_PATH: /data/task_run_history.sqlite3
      AGENT_HEARTBEAT_DB_PATH: /data/task_run_history.sqlite3
      CANDIDATE_PROFILE_DB_PATH: /data/task_run_history.sqlite3
      DAILY_OPS_REPORT_DB_PATH: /data/task_run_history.sqlite3
      DEAL_ALERT_STATE_DB_PATH: /data/task_run_history.sqlite3
    command: ["python", "worker/heartbeat_supervisor.py"]
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/data
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    environment:
      SCHEDULER_NAME: scheduler
      TASK_RUN_HISTORY_DB_PATH: /data/task_run_history.sqlite3
      AI_USAGE_DB_PATH: /data/task_run_history.sqlite3
      EVENT_LOG_DB_PATH: /data/task_run_history.sqlite3
      SYSTEM_METRICS_DB_PATH: /data/task_run_history.sqlite3
      AGENT_HEARTBEAT_DB_PATH: /data/task_run_history.sqlite3
      CANDIDATE_PROFILE_DB_PATH: /data/task_run_history.sqlite3
      DAILY_OPS_REPORT_DB_PATH: /data/task_run_history.sqlite3
      DEAL_ALERT_STATE_DB_PATH: /data/task_run_history.sqlite3
    command: ["python", "scheduler.py"]
    depends_on:
      - postgres
      - redis
    volumes:
      - ./data:/data
    restart: unless-stopped

volumes:
  pgdata:
